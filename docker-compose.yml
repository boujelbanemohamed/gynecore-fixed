version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: gynecare-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gynecare
      POSTGRES_PASSWORD: gynecare_password
      POSTGRES_DB: gynecare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gynecare"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile-backend
    container_name: gynecare-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://gynecare:gynecare_password@db:5432/gynecare
      JWT_SECRET: change_me_in_production
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost:3000
      UPLOAD_DIR: ./uploads
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile-frontend
    container_name: gynecare-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
